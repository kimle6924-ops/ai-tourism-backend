services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ai_tourism
      MYSQL_USER: app
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${DB_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysqldata:/var/lib/mysql

  api:
    build:
      context: ./BE_AI_Tourism
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DATABASE_URL=Server=db;Port=3306;Database=ai_tourism;User=app;Password=${DB_PASSWORD};CharSet=utf8mb4
      - JWT__SECRET=${JWT__SECRET}
      - JWT__ISSUER=AITourism
      - JWT__AUDIENCE=AITourism
      - JWT__EXPIRATIONINMINUTES=60
      - CLOUDINARY__CLOUDNAME=${CLOUDINARY__CLOUDNAME}
      - CLOUDINARY__APIKEY=${CLOUDINARY__APIKEY}
      - CLOUDINARY__APISECRET=${CLOUDINARY__APISECRET}
      - CLOUDINARY__FOLDER=ai-tourism
      - GEMINI__APIKEY=${GEMINI__APIKEY}
      - GEMINI__MODEL=${GEMINI__MODEL:-gemini-2.5-flash}
      - SECURITY__ALLOWPLAINTEXTPASSWORD=true
      - SECURITY__ENVIRONMENTMODE=Development
      - CORS__ALLOWEDORIGINS=${CORS__ALLOWEDORIGINS:-http://localhost:3000}

volumes:
  mysqldata:
